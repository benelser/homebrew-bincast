# Generated by bincast — https://github.com/benelser/bincast
name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Update formula
        env:
          VERSION: ${{ github.event.client_payload.version }}
        run: |
          VER="${VERSION#v}"
          for target in aarch64-apple-darwin x86_64-apple-darwin aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu; do
            URL="https://github.com/benelser/bincast/releases/download/${VERSION}/bincast-${target}.tar.gz.sha256"
            SHA=$(curl -fsSL "$URL" | awk '{print $1}')
            sed -i "/${target}/{ n; s/sha256 \"[a-f0-9A-Z]*\"/sha256 \"${SHA}\"/; }" Formula/bincast.rb
          done
          sed -i "s/version \"[^\"]*\"/version \"${VER}\"/" Formula/bincast.rb

      - name: Commit and push
        run: |
          git config user.name "bincast[bot]"
          git config user.email "bincast[bot]@users.noreply.github.com"
          git add Formula/bincast.rb
          git commit -m "bincast ${VERSION}"
          git push
